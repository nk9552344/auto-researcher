ollama_host: "http://localhost:11434"

models:
  coordinator: "qwen2.5:14b-instruct"    # drives hypothesis/decompose/integrate
  default:     "qwen2.5-coder:7b"         # fallback for any unmatched subtask
  embed:       "nomic-embed-text"          # embeddings (never routed)
  workers:
    - name: "mathstral:7b"
      skills: ["math", "proof", "numeric"]
      options:
        temperature: 0.2
    - name: "qwen2.5-coder:7b"
      skills: ["code", "refactor", "debug"]
    - name: "deepseek-r1:8b"
      skills: ["reasoning", "planning", "analysis"]

# === Target ===
target_repo: "/path/to/your/repo"          # REQUIRED: absolute path to the repo under improvement
worktree_root: "/tmp/auto-researcher/worktrees"
github_remote: "origin"
github_branch_prefix: "auto-researcher"

# === Loop control ===
max_subagents: 4
dup_threshold: 0.97      # cosine similarity above which a hypothesis is rejected as a near-exact failure duplicate
novelty_boost: 0.3       # temperature bump added when coordinator is forming a novelty-forced hypothesis

# === Context budgets ===
context_token_budget: 8192

coordinator_context_ratios:
  task_spec: 0.20
  memory:    0.30
  files:     0.35
  rolling_summary: 0.15

subagent_context_ratios:
  task_brief:      0.20
  files:           0.50
  memory:          0.15
  rolling_summary: 0.15

# === Subagent execution ===
subagent_step_cap: 20      # max ReAct steps per subagent
summary_every_n:   5       # regenerate rolling summary every N steps

# === Sandbox ===
sandbox:
  max_cpu_seconds: 120
  max_memory_mb:   512
  timeout_seconds: 300

# === Persistence ===
data_dir: "./data"   # episodic.db, state.db, semantic_db/ will be created here

# === Server ===
server:
  host: "0.0.0.0"
  port: 8000

# === Reward-hacking safeguards ===
protected_patterns:
  - "tests/"
  - "test/"
  - "held_out/"
  - "eval/"
  - "benchmark/"
  - "*.test.*"
  - "test_*.py"
  - "*_test.py"
